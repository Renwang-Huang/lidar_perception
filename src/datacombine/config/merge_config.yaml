merge_cloud_node:
  ros__parameters:

    # lidar1 保持参考坐标系，不做额外变换
    lidar1.roll: 0.0        
    lidar1.pitch: 0.0     
    lidar1.yaw: 0.0         
    lidar1.tx: 0.0           
    lidar1.ty: 0.0            
    lidar1.tz: 0.0             

    # lidar2 相对于 lidar1 的变换
    lidar2.roll: 3.14159       # 绕 X 轴旋转 180°
    lidar2.pitch: 0.0
    lidar2.yaw: 0.0
    lidar2.tx: 0.0
    lidar2.ty: 0.0
    lidar2.tz: 0.07            # 沿 Z 正轴平移 70mm